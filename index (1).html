<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bernabéu Canvas - Glassmorphism</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/CSS/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand" href="#">Animación 2D</a>
        </div>
    </nav>

    <div class="container text-center flex-grow-1 mt-4">
        <div class="row justify-content-center">
            <div class="col-md-4 mb-4">
                <div class="glass-panel p-4 text-white">
                    <h5 class="mb-3">Configuración</h5>
                    <div class="mb-3 text-start">
                        <label class="form-label">Cantidad de Círculos</label>
                        <input type="number" id="cantidad" class="form-control bg-transparent text-white" value="15" min="1" max="100">
                    </div>
                    <div class="mb-3 text-start">
                        <label class="form-label">Ancho del Canvas (%)</label>
                        <input type="range" id="anchoControl" class="form-range" min="30" max="95" value="75">
                    </div>
                    <div class="mb-3 text-start">
                        <label class="form-label">Alto del Canvas (px)</label>
                        <input type="range" id="altoControl" class="form-range" min="200" max="600" value="450">
                    </div>
                    <button id="btnGenerar" class="btn btn-primary w-100 shadow-sm">Reiniciar Sistema</button>
                </div>
            </div>

            <div class="col-md-8">
                <canvas id="canvas" class="glass-canvas"></canvas>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-4">
        <div class="container">
            <p class="mb-0">Programador: Christopher Rodríguez Pérez - ITP</p>
            <small>Efecto Glassmorphism </small>
        </div>
    </footer>

    <script src="./assets/js/js/main.js"></script>
</body>
</html>
