<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Círculos- Glassmorphism</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="./assets/IMG/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="./assets/CSS/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand" href="#">Simulador de Físicas</a>
        </div>
    </nav>
<div class="container-fluid text-center flex-grow-1 mt-4">
        <div class="row justify-content-center px-4">
            <div class="col-lg-3 col-md-4 mb-4">
                <div class="glass-panel p-4 text-white">
                    <h5 class="mb-3">Configuración</h5>
                    
                    <div class="mb-3 text-start">
                        <label class="form-label">Cantidad de Pelotas</label>
                        <input type="number" id="cantidad" class="form-control" value="10" min="1" max="100">
                    </div>

                    <div class="mb-3 text-start">
                        <label class="form-label">Punto de Lanzamiento</label>
                        <select id="lanzamiento" class="form-select">
                            <option value="top-left">Esquina Sup. Izquierda</option>
                            <option value="top-right">Esquina Sup. Derecha</option>
                            <option value="bottom-left">Esquina Inf. Izquierda</option>
                            <option value="bottom-right">Esquina Inf. Derecha</option>
                            <option value="top">Desde Arriba</option>
                            <option value="bottom">Desde Abajo</option>
                        </select>
                    </div>

                    <hr class="my-3">

                    <div class="mb-3 text-start">
                        <label class="form-label">Ancho Canvas: <span id="valAncho">700</span>px</label>
                        <input type="range" id="anchoCanvas" class="form-range" min="300" max="1000" value="700">
                    </div>

                    <div class="mb-3 text-start">
                        <label class="form-label">Alto Canvas: <span id="valAlto">500</span>px</label>
                        <input type="range" id="altoCanvas" class="form-range" min="200" max="600" value="500">
                    </div>

                    <button id="btnGenerar" class="btn btn-primary w-100 shadow-sm">
                        Lanzar Pelotas
                    </button>
                </div>
            </div>

            <div class="col-lg-9 col-md-8">
                <div class="canvas-container shadow-lg">
                    <canvas id="canvas" class="glass-canvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-4">
        <div class="container">
            <p class="mb-0">Programador: Christopher Rodríguez Pérez - ITP</p>
            <small>Físicas Reales & Glassmorphism</small>
        </div>
    </footer>

    <script src="./assets/js/js/main.js"></script>
</body>
</html>
